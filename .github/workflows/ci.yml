name: CI

on:
  # Cover fork default branch (master) + inherited upstream branches
  # (main, dev) so PRs to master actually trigger checks — previously
  # pushes to master silently skipped CI. See AGENTS.md §"CI trigger drift".
  pull_request:
    branches: [master, main, dev]
  # Catch direct pushes to default branches as a safety net (no
  # required-PR workflow on this repo, so accidental force-push to
  # master bypasses review).
  push:
    branches: [master, main, dev]

# Cancel stale runs when new commits land on the same branch.
# Without this, every force-push spawns a parallel run that wastes
# CI minutes and floods the PR / commit with notifications.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Format check
        run: python -m ruff format --check rikugan/

      - name: Lint
        run: python -m ruff check rikugan/  # config in pyproject.toml

  typecheck:
    name: Mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install mypy tomli

      - name: Type check (core + providers)
        run: python -m mypy rikugan/core rikugan/providers  # config in pyproject.toml

  test:
    name: Pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    # pyproject.toml advertises both 3.11 and 3.12 support. Run pytest
    # on both so a 3.12-specific bug can't slip through. Lint and
    # typecheck stay on 3.11 (single stable tool version), and
    # desloppify stays on 3.11 to keep its objective score reproducible
    # (see AGENTS.md §"Note — Python version and desloppify scores").
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev tools
        run: pip install pytest tomli

      # Tests import rikugan.ui.* which imports PySide6 at module
      # level (subject to Shiboken UAF on Python 3.13+ — see
      # rikugan_plugin.py docstring). PySide6 + a subset of runtime
      # deps are required for the headless tests; the heavy ones
      # (anthropic, openai, ...) are mock-stubbed via tests/mocks/.
      - name: Install runtime + test deps
        run: |
          pip install -r requirements.txt
          pip install PySide6

      - name: Run tests
        run: python -m pytest tests/ --tb=short -q

  quality:
    name: Desloppify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install desloppify
        run: pip install desloppify

      - name: Run objective scan
        run: desloppify scan --profile objective --no-badge

      - name: Score regression gate
        run: |
          python -c "
          import json, sys

          try:
              data = json.load(open('.desloppify/query.json'))
              score = float(data.get('objective_score', 0))
          except Exception:
              print('Could not read desloppify score — failing safe')
              sys.exit(1)

          BASELINE = 89.0
          TOLERANCE = 0.5

          if score < BASELINE - TOLERANCE:
              sys.exit(f'Score {score}/100 is below baseline {BASELINE} (tolerance {TOLERANCE}) — fix before merging')
          print(f'OK — objective score {score}/100 (baseline {BASELINE})')
          "

      - name: Get changed Python files
        id: changed
        if: github.event_name == 'pull_request'
        # `github.base_ref` is only populated on pull_request events.
        # For push events (e.g. direct force-push to master), the diff
        # against the merge base is undefined, so the security gate is
        # skipped here and only the objective-score gate above applies.
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' > /tmp/changed_files.txt
          echo "Changed files:"
          cat /tmp/changed_files.txt

      - name: Gate on security findings in changed files
        if: github.event_name == 'pull_request'
        run: |
          python -c "
          import json, subprocess, sys

          changed = [l.strip() for l in open('/tmp/changed_files.txt') if l.strip()]
          if not changed:
              print('No Python files changed — skipping security gate')
              sys.exit(0)

          findings = []
          for f in changed:
              result = subprocess.run(
                  ['desloppify', 'show', f, '--output', '/tmp/file_findings.json', '--status', 'open'],
                  capture_output=True
              )
              try:
                  data = json.load(open('/tmp/file_findings.json'))
                  file_findings = data if isinstance(data, list) else data.get('findings', [])
                  findings.extend(file_findings)
              except (json.JSONDecodeError, FileNotFoundError):
                  pass

          if not findings:
              print(f'OK — no open findings in {len(changed)} changed file(s)')
              sys.exit(0)

          security = [f for f in findings if f.get('detector') == 'security']
          other    = [f for f in findings if f.get('detector') != 'security']

          for f in security:
              print(f\"SECURITY: {f.get('file')} — {f.get('message', f.get('id', '?'))}\")
          for f in other[:5]:
              print(f\"  {f.get('detector')}: {f.get('file')} — {f.get('message', f.get('id', '?'))}\")

          if security:
              sys.exit(f'{len(security)} security finding(s) in your changed files — fix before merging')

          print(f'Advisory: {len(other)} non-security finding(s) in changed files (not blocking)')
          "

  # Single gate job — mark this as a required status check in branch protection
  gate:
    name: CI Gate
    if: always()
    needs: [lint, typecheck, test, quality]
    runs-on: ubuntu-latest
    steps:
      - name: Check job results
        run: |
          echo "lint:      ${{ needs.lint.result }}"
          echo "typecheck: ${{ needs.typecheck.result }}"
          echo "test:      ${{ needs.test.result }}"
          echo "quality:   ${{ needs.quality.result }}"

          if [[ "${{ needs.lint.result }}" != "success" ]] ||
             [[ "${{ needs.typecheck.result }}" != "success" ]] ||
             [[ "${{ needs.test.result }}" != "success" ]] ||
             [[ "${{ needs.quality.result }}" != "success" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-and-release:
    name: Validate & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate tag matches PLUGIN_VERSION
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          VERSION=$(python -c "from rikugan.constants import PLUGIN_VERSION; print(PLUGIN_VERSION)")
          echo "Tag: $TAG  |  PLUGIN_VERSION: $VERSION"
          if [ "$TAG" != "$VERSION" ]; then
            echo "ERROR: tag v$TAG does not match PLUGIN_VERSION $VERSION"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
